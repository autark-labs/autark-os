id: adguard-home
metadata:
  name: AdGuard Home
  category: Network
  description: Block ads, trackers, and risky domains for the whole network.
  shortValue: Cleaner browsing for every device connected to your home network.
  badge: Verified
  downloads: 980K
  rating: '4.8'
  image: /app-images/adguard-home.svg
  version: 0.107.77
  lastUpdated: 3 days ago
  size: 85 MB
  maintainer: AdGuard
  source: GitHub
  sourceUrl: https://github.com/AdguardTeam/AdGuardHome
  documentationUrl: https://github.com/AdguardTeam/AdGuardHome/wiki
  installTime: 2-4 minutes
  difficulty: Moderate
  supportLevel: Advanced
  supportSummary: Best for users comfortable reviewing network, media, or monitoring choices before install.
  accessUrl: http://localhost:3000
  tags:
    - DNS
    - Ad blocking
    - Privacy
    - Network safety
testing:
  smokeTests:
    - label: Install plan generated
      status: Passed
      detail: Manifest loads and produces an Autark-OS install plan.
    - label: x86_64 image pull
      status: Needs end-to-end test
      detail: Image source is documented; pull still needs verification on a clean x86_64 host.
    - label: arm64 image pull
      status: Needs hardware test
      detail: Needs Raspberry Pi or other arm64 validation before being marked fully ready.
    - label: Container starts
      status: Needs end-to-end test
      detail: Needs clean-host install validation with Docker Compose.
    - label: Local URL responds
      status: Needs end-to-end test
      detail: Needs browser smoke test after install.
    - label: Tailscale link works
      status: Needs end-to-end test
      detail: Needs private-link validation on a tailnet.
    - label: Backup path exists
      status: Passed
      detail: Manifest declares managed backup paths under the Autark-OS app folder.
    - label: Uninstall safety checkpoint
      status: Needs end-to-end test
      detail: Needs install, backup checkpoint, and uninstall validation on a real host.

user:
  bestFor:
    - Blocking ads
    - Reducing trackers
    - Protecting kids devices
  highlights:
    - Network-wide filtering
    - Per-device statistics
    - Custom block lists
  plainLanguage: AdGuard Home works like a smart phonebook for your network, blocking known ad and tracking addresses before devices connect to them.
technical:
  summary: Deploys DNS and web admin services with host networking options, persistent config, filter-list updates, and backup snapshots.
  requirements:
    - 1 CPU core
    - 256 MB RAM
    - Static server IP recommended
    - Router DNS configuration
  includes:
    - DNS resolver
    - Admin dashboard
    - Filter list updater
    - Config backup
  configuration:
    - label: Container name
      value: adguard-home
    - label: Network
      value: host
    - label: Ports
      value: 53, 80, 3000
    - label: Data storage
      value: /var/lib/autark-os/apps/adguard-home/work
    - label: Backup
      value: Configuration daily
    - label: Access
      value: LAN admin plus Tailscale
access:
  kind: multi-port
  defaultMode: local-and-private
  privateAccessRecommended: true
  requiresFirstRunSetup: true
  notes:
    - DNS service ports stay local so home devices can use filtering.
    - The admin dashboard should be reachable privately instead of publicly exposed.
usage:
  kind: admin-service
  primaryAction: configure-network
  openUrlLabel: Open AdGuard setup
  headline: Point your home devices at AdGuard
  summary: Autark-OS starts the DNS filtering service. To protect the whole home, your router or devices need to use this server for DNS.
  setupSteps:
    - Open AdGuard setup and create the admin account.
    - Choose DNS filtering defaults that match your home.
    - In your router settings, set this Autark-OS device as the DNS server.
    - If you cannot change router DNS, configure DNS on individual phones, laptops, or smart TVs.
  fields:
    - label: Setup URL
      value: "{accessUrl}"
      sensitive: false
      qr: true
  notes:
    - Router setup varies by brand, so Autark-OS shows the values and keeps advanced network details nearby.
    - Keep the admin dashboard private.
health:
  type: http
  path: /
  startupGraceSeconds: 180
  successLabel: DNS dashboard is ready
  startingLabel: Starting DNS filtering
  failureLabel: AdGuard Home is not responding
  description: Autark-OS checks that the AdGuard Home setup dashboard answers.
runtime:
  containerName: adguard-home
  composeProject: autark-os-adguard-home
  image: adguard/adguardhome:v0.107.77
  network: host
  runtimeRoot: /var/lib/autark-os/apps/adguard-home
  ports:
    - 53:53/tcp
    - 53:53/udp
    - 3000:3000
  volumes:
    - /var/lib/autark-os/apps/adguard-home/work:/opt/adguardhome/work
    - /var/lib/autark-os/apps/adguard-home/conf:/opt/adguardhome/conf
  labels:
    - autark-os.managed=true
    - autark-os.app-id=adguard-home
    - autark-os.version=0.107.77
  backupPaths:
    - work
    - conf
  privileged: false
