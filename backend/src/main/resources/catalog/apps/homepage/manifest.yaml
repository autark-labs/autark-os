id: homepage
metadata:
  name: Homepage
  category: Utilities
  description: A fast dashboard for links, service status, and homelab widgets.
  shortValue: One clean start page for everything running in your home lab.
  badge: Verified
  downloads: 900K
  rating: '4.8'
  image: /app-images/homepage.svg
  version: 1.13.2
  lastUpdated: Recently
  size: 180 MB
  maintainer: Homepage Community
  source: GitHub
  sourceUrl: https://github.com/gethomepage/homepage
  documentationUrl: https://gethomepage.dev/latest/
  installTime: 2-3 minutes
  difficulty: Easy
  supportLevel: Ready
  supportSummary: Good default candidate for normal users; template is simple and low-risk.
  accessUrl: http://localhost:3003
  tags:
    - Dashboard
    - Start page
    - Widgets
    - Bookmarks
testing:
  smokeTests:
    - label: Install plan generated
      status: Passed
      detail: Manifest loads and produces an Autark-OS install plan.
    - label: x86_64 image pull
      status: Needs end-to-end test
      detail: Image source is documented; pull still needs verification on a clean x86_64 host.
    - label: arm64 image pull
      status: Needs hardware test
      detail: Needs Raspberry Pi or other arm64 validation before being marked fully ready.
    - label: Container starts
      status: Needs end-to-end test
      detail: Needs clean-host install validation with Docker Compose.
    - label: Local URL responds
      status: Needs end-to-end test
      detail: Needs browser smoke test after install.
    - label: Tailscale link works
      status: Needs end-to-end test
      detail: Needs private-link validation on a tailnet.
    - label: Backup path exists
      status: Passed
      detail: Manifest declares managed backup paths under the Autark-OS app folder.
    - label: Uninstall safety checkpoint
      status: Needs end-to-end test
      detail: Needs install, backup checkpoint, and uninstall validation on a real host.

user:
  bestFor:
    - Homelab landing page
    - App bookmarks
    - Service visibility
  highlights:
    - Clean dashboard UI
    - Widgets for common services
    - Easy bookmark organization
  plainLanguage: Homepage gives your home server one friendly start page where family or admins can find the apps that matter.
technical:
  summary: Deploys Homepage with managed configuration storage and a local web dashboard.
  requirements:
    - 1 CPU core
    - 256 MB RAM
    - Configuration storage
  includes:
    - Dashboard web app
    - Managed config folder
    - Backup profile
  configuration:
    - label: Container name
      value: homepage
    - label: Network
      value: autark-os-apps
    - label: Ports
      value: 3003:3000
    - label: Data storage
      value: /var/lib/autark-os/apps/homepage/config
    - label: Backup
      value: Configuration daily
    - label: Access
      value: Local and Tailscale
access:
  kind: web
  defaultMode: local-and-private
  privateAccessRecommended: true
  requiresFirstRunSetup: false
  notes:
    - Private access is useful if you want a single dashboard while away from home.
    - Add managed app links from Homepage's own configuration when you want them on the dashboard.
usage:
  kind: web-app
  primaryAction: open-dashboard
  openUrlLabel: Open Homepage
  headline: Open your homelab dashboard
  summary: Autark-OS starts Homepage. Add the apps and links you want to see from its configuration files.
  setupSteps:
    - Open Homepage.
    - Add services, bookmarks, and widgets.
    - Keep private access enabled if the dashboard lists sensitive internal links.
  fields:
    - label: Dashboard URL
      value: "{accessUrl}"
      sensitive: false
      qr: true
  notes:
    - Add and maintain dashboard entries in Homepage's configuration files.
setup:
  kind: dashboard
  automation: manual
  copyableFields:
    - label: Dashboard URL
      value: "{accessUrl}"
      sensitive: false
  userSteps:
    - Open Homepage after install.
    - Add services, bookmarks, and widgets from Homepage's dashboard settings.
  automationCapabilities: []
health:
  type: http
  path: /
  startupGraceSeconds: 180
  successLabel: Dashboard is ready
  startingLabel: Starting dashboard
  failureLabel: Homepage is not responding
  description: Autark-OS checks that the Homepage dashboard answers before calling it ready.
runtime:
  containerName: homepage
  composeProject: autark-os-homepage
  image: ghcr.io/gethomepage/homepage:v1.13.2
  network: autark-os-apps
  runtimeRoot: /var/lib/autark-os/apps/homepage
  ports:
    - 3003:3000
  volumes:
    - /var/lib/autark-os/apps/homepage/config:/app/config
  labels:
    - autark-os.managed=true
    - autark-os.app-id=homepage
    - autark-os.version=1.13.2
  backupPaths:
    - config
  privileged: false
