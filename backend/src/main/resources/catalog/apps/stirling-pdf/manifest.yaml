id: stirling-pdf
metadata:
  name: Stirling PDF
  category: Utilities
  description: Private PDF tools for merging, splitting, converting, and compressing documents.
  shortValue: Handle common PDF tasks without uploading files to random websites.
  badge: Verified
  downloads: 1.1M
  rating: '4.7'
  image: /app-images/stirling-pdf.svg
  version: 2.14.0
  lastUpdated: Recently
  size: 690 MB
  maintainer: Stirling Tools
  source: GitHub
  sourceUrl: https://github.com/Stirling-Tools/Stirling-PDF
  documentationUrl: https://docs.stirlingpdf.com/
  installTime: 3-5 minutes
  difficulty: Easy
  supportLevel: Ready
  supportSummary: Good default candidate for normal users; template is simple and low-risk.
  accessUrl: http://localhost:8095
  tags:
    - PDF
    - Documents
    - Conversion
    - Utilities
testing:
  smokeTests:
    - label: Install plan generated
      status: Passed
      detail: Manifest loads and produces an Autark-OS install plan.
    - label: x86_64 image pull
      status: Needs end-to-end test
      detail: Image source is documented; pull still needs verification on a clean x86_64 host.
    - label: arm64 image pull
      status: Needs hardware test
      detail: Needs Raspberry Pi or other arm64 validation before being marked fully ready.
    - label: Container starts
      status: Needs end-to-end test
      detail: Needs clean-host install validation with Docker Compose.
    - label: Local URL responds
      status: Needs end-to-end test
      detail: Needs browser smoke test after install.
    - label: Tailscale link works
      status: Needs end-to-end test
      detail: Needs private-link validation on a tailnet.
    - label: Backup path exists
      status: Passed
      detail: Manifest declares managed backup paths under the Autark-OS app folder.
    - label: Uninstall safety checkpoint
      status: Needs end-to-end test
      detail: Needs install, backup checkpoint, and uninstall validation on a real host.

user:
  bestFor:
    - Merging PDFs
    - Compressing documents
    - Converting files privately
  highlights:
    - Common PDF tools in one place
    - Keeps files on your own server
    - Useful for home admin paperwork
  plainLanguage: Stirling PDF gives you a private toolbox for everyday PDF tasks so sensitive documents do not need to be uploaded to public websites.
technical:
  summary: Deploys Stirling PDF with managed configuration storage, local web access, and backup metadata.
  requirements:
    - 1 CPU core
    - 1 GB RAM
    - Temporary workspace for document processing
  includes:
    - Web PDF toolbox
    - Managed configuration folder
    - Temporary processing folder
    - Backup profile
  configuration:
    - label: Container name
      value: stirling-pdf
    - label: Network
      value: autark-os-apps
    - label: Ports
      value: 8095:8080
    - label: Data storage
      value: /var/lib/autark-os/apps/stirling-pdf/config
    - label: Backup
      value: Configuration daily
    - label: Access
      value: Local or Tailscale
access:
  kind: web
  defaultMode: local-and-private
  privateAccessRecommended: true
  requiresFirstRunSetup: false
  notes:
    - Private access is useful when working with documents away from home.
    - Public exposure is not recommended because PDFs may contain sensitive information.
usage:
  kind: web-app
  primaryAction: open-dashboard
  openUrlLabel: Open Stirling PDF
  headline: Process documents privately
  summary: Open Stirling PDF and try one small document before using it for important files.
  setupSteps:
    - Open Stirling PDF.
    - Process a small non-sensitive document to confirm the workflow.
    - Use private access when working away from your local network.
  fields:
    - label: Web UI
      value: "{accessUrl}"
      sensitive: false
      qr: false
  notes:
    - Processed documents can contain sensitive information; do not expose this service publicly.
health:
  type: http
  path: /
  startupGraceSeconds: 240
  successLabel: PDF tools are ready
  startingLabel: Starting Stirling PDF
  failureLabel: Stirling PDF is not responding
  description: Autark-OS checks that the Stirling PDF web interface answers.
runtime:
  containerName: stirling-pdf
  composeProject: autark-os-stirling-pdf
  image: stirlingtools/stirling-pdf:2.14.0
  network: autark-os-apps
  runtimeRoot: /var/lib/autark-os/apps/stirling-pdf
  ports:
    - 8095:8080
  volumes:
    - /var/lib/autark-os/apps/stirling-pdf/config:/configs
    - /var/lib/autark-os/apps/stirling-pdf/work:/usr/share/tessdata
  labels:
    - autark-os.managed=true
    - autark-os.app-id=stirling-pdf
    - autark-os.version=2.14.0
  backupPaths:
    - config
  privileged: false
