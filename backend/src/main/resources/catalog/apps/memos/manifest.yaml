id: memos
metadata:
  name: Memos
  category: Productivity
  description: Lightweight personal notes and quick knowledge capture.
  shortValue: A private notes app for thoughts, links, snippets, and logs.
  badge: Verified
  downloads: 620K
  rating: '4.7'
  image: /app-images/memos.svg
  version: 0.29.1
  lastUpdated: Recently
  size: 120 MB
  maintainer: Memos Community
  source: GitHub
  sourceUrl: https://github.com/usememos/memos
  documentationUrl: https://www.usememos.com/docs
  installTime: 2-3 minutes
  difficulty: Easy
  supportLevel: Ready
  supportSummary: Good default candidate for normal users; template is simple and low-risk.
  accessUrl: http://localhost:5230
  tags:
    - Notes
    - Knowledge base
    - Markdown
    - Journaling
testing:
  smokeTests:
    - label: Install plan generated
      status: Passed
      detail: Manifest loads and produces an Autark-OS install plan.
    - label: x86_64 image pull
      status: Needs end-to-end test
      detail: Image source is documented; pull still needs verification on a clean x86_64 host.
    - label: arm64 image pull
      status: Needs hardware test
      detail: Needs Raspberry Pi or other arm64 validation before being marked fully ready.
    - label: Container starts
      status: Needs end-to-end test
      detail: Needs clean-host install validation with Docker Compose.
    - label: Local URL responds
      status: Needs end-to-end test
      detail: Needs browser smoke test after install.
    - label: Tailscale link works
      status: Needs end-to-end test
      detail: Needs private-link validation on a tailnet.
    - label: Backup path exists
      status: Passed
      detail: Manifest declares managed backup paths under the Autark-OS app folder.
    - label: Uninstall safety checkpoint
      status: Needs end-to-end test
      detail: Needs install, backup checkpoint, and uninstall validation on a real host.

user:
  bestFor:
    - Quick notes
    - Personal knowledge capture
    - Saving links and snippets
  highlights:
    - Fast note entry
    - Markdown support
    - Private self-hosted storage
  plainLanguage: Memos gives you a small private notes space for reminders, links, snippets, and lightweight documentation.
technical:
  summary: Deploys Memos with persistent data storage, a local web dashboard, and backup metadata.
  requirements:
    - 1 CPU core
    - 256 MB RAM
    - Persistent storage volume
  includes:
    - Memos web app
    - SQLite-backed data folder
    - Local dashboard port
    - Backup profile
  configuration:
    - label: Container name
      value: memos
    - label: Network
      value: project-os-apps
    - label: Ports
      value: 5230:5230
    - label: Data storage
      value: /var/lib/project-os/apps/memos/data
    - label: Backup
      value: Notes daily
    - label: Access
      value: Tailscale recommended
access:
  kind: web
  defaultMode: private
  privateAccessRecommended: true
  requiresFirstRunSetup: true
  notes:
    - Private access is recommended because notes often contain sensitive personal information.
    - First-run setup creates the first user and workspace preferences.
runtime:
  containerName: memos
  composeProject: project-os-memos
  image: ghcr.io/usememos/memos:0.29.1
  network: project-os-apps
  runtimeRoot: /var/lib/project-os/apps/memos
  ports:
    - 5230:5230
  volumes:
    - /var/lib/project-os/apps/memos/data:/var/opt/memos
  labels:
    - project-os.managed=true
    - project-os.app-id=memos
    - project-os.version=0.29.1
  backupPaths:
    - data
  privileged: false
