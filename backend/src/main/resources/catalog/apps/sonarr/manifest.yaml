id: sonarr
metadata:
  name: Sonarr
  category: Media
  description: TV library manager for monitoring, organizing, and automating episodes.
  shortValue: Keep TV libraries organized and monitored from one dashboard.
  badge: Verified
  downloads: 2.2M
  rating: '4.8'
  image: /app-images/sonarr.svg
  version: latest
  lastUpdated: Recently
  size: 210 MB
  maintainer: Sonarr Community
  source: GitHub
  sourceUrl: https://github.com/Sonarr/Sonarr
  documentationUrl: https://wiki.servarr.com/sonarr
  installTime: 3-5 minutes
  difficulty: Advanced
  supportLevel: Advanced
  supportSummary: Best for users comfortable reviewing network, media, or monitoring choices before install.
  accessUrl: http://localhost:8989
  tags:
    - TV
    - Media automation
    - Library management
    - Arr stack
testing:
  smokeTests:
    - label: Install plan generated
      status: Passed
      detail: Manifest loads and produces a Project OS install plan.
    - label: x86_64 image pull
      status: Needs end-to-end test
      detail: Image source is documented; pull still needs verification on a clean x86_64 host.
    - label: arm64 image pull
      status: Needs hardware test
      detail: Needs Raspberry Pi or other arm64 validation before being marked fully ready.
    - label: Container starts
      status: Needs end-to-end test
      detail: Needs clean-host install validation with Docker Compose.
    - label: Local URL responds
      status: Needs end-to-end test
      detail: Needs browser smoke test after install.
    - label: Tailscale link works
      status: Needs end-to-end test
      detail: Needs private-link validation on a tailnet.
    - label: Backup path exists
      status: Passed
      detail: Manifest declares managed backup paths under the Project OS app folder.
    - label: Uninstall safety checkpoint
      status: Needs end-to-end test
      detail: Needs install, backup checkpoint, and uninstall validation on a real host.

user:
  bestFor:
    - Organizing TV libraries
    - Tracking wanted episodes
    - Pairing with download tools
  highlights:
    - TV series monitoring
    - Rename and organize episodes
    - Integrates with indexers and download clients
  plainLanguage: Sonarr helps advanced media users keep TV libraries organized and can connect to download tools when you choose to configure that workflow.
technical:
  summary: Deploys Sonarr with persistent configuration, TV and downloads folders, local dashboard access, and backup metadata.
  requirements:
    - 1 CPU core
    - 512 MB RAM
    - Media storage folders
    - Optional indexer and download client
  includes:
    - Sonarr dashboard
    - Configuration storage
    - TV library mount
    - Downloads mount
  configuration:
    - label: Container name
      value: sonarr
    - label: Network
      value: project-os-apps
    - label: Ports
      value: 8989:8989
    - label: Data storage
      value: /var/lib/project-os/apps/sonarr/config
    - label: Backup
      value: Configuration daily
    - label: Access
      value: Local and Tailscale
access:
  kind: web
  defaultMode: local-and-private
  privateAccessRecommended: true
  requiresFirstRunSetup: true
  notes:
    - Dashboard access should stay private because it can control media workflows.
    - Project OS should eventually autowire this with Prowlarr and qBittorrent.
usage:
  kind: companion-service
  primaryAction: open-dashboard
  openUrlLabel: Open Sonarr
  headline: Set up TV library automation
  summary: Project OS starts Sonarr and prepares folders. You connect indexers, download clients, and library paths in Sonarr.
  setupSteps:
    - Open Sonarr.
    - Add your TV library path.
    - Connect Prowlarr for indexers if installed.
    - Connect qBittorrent or another download client if desired.
  fields:
    - label: Dashboard URL
      value: "{accessUrl}"
      sensitive: false
      qr: false
  notes:
    - This is a power-user media tool. It is not required for Jellyfin playback.
setup:
  kind: media-stack
  automation: planned
  copyableFields:
    - label: Dashboard URL
      value: "{accessUrl}"
      sensitive: false
  integrations:
    - id: sonarr-prowlarr
      name: Connect Prowlarr indexers
      targetAppId: prowlarr
      description: Use Prowlarr as the central indexer source for Sonarr.
      requiresApproval: true
      plannedActions:
        - Confirm Prowlarr is installed and reachable.
        - Ask for approval before creating a Sonarr app entry in Prowlarr.
        - Ask for approval before adding Prowlarr as a Sonarr indexer source.
    - id: sonarr-qbittorrent
      name: Connect qBittorrent downloads
      targetAppId: qbittorrent
      description: Let Sonarr send approved TV downloads to qBittorrent.
      requiresApproval: true
      plannedActions:
        - Confirm qBittorrent is installed and reachable.
        - Ask for approval before adding qBittorrent as a Sonarr download client.
        - Keep download paths inside Project OS managed folders.
  userSteps:
    - Review media folders before enabling automated downloads.
    - Approve each connection before Project OS changes Sonarr.
  automationCapabilities:
    - Can detect whether Prowlarr and qBittorrent are installed.
    - Can propose indexer and download-client wiring.
    - Will require approval before changing Sonarr or companion apps.
health:
  type: http
  path: /
  startupGraceSeconds: 240
  successLabel: TV manager is ready
  startingLabel: Starting TV manager
  failureLabel: Sonarr is not responding
  description: Project OS checks that the Sonarr dashboard answers before calling it ready.
runtime:
  containerName: sonarr
  composeProject: project-os-sonarr
  image: lscr.io/linuxserver/sonarr:latest
  network: project-os-apps
  runtimeRoot: /var/lib/project-os/apps/sonarr
  ports:
    - 8989:8989
  volumes:
    - /var/lib/project-os/apps/sonarr/config:/config
    - /var/lib/project-os/apps/sonarr/tv:/tv
    - /var/lib/project-os/apps/sonarr/downloads:/downloads
  environment:
    - PUID=1000
    - PGID=1000
    - TZ=UTC
  labels:
    - project-os.managed=true
    - project-os.app-id=sonarr
    - project-os.version=latest
  backupPaths:
    - config
  privileged: false
