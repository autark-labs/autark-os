spring:
  application:
    name: autark-os-backend
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8082

autark-os:
  runtime-root: ../runtime/autark-os
  guardian:
    enabled: true
    initial-delay-ms: 10000
    interval-ms: 15000
  backups:
    scheduler:
      enabled: true
      initial-delay-ms: 30000
      interval-ms: 60000
    retention:
      initial-delay-ms: 120000
      interval-ms: 21600000
  retention:
    # Routine records are short-lived; warnings and failed jobs remain longer
    # for support and recovery review. Active jobs are never selected for pruning.
    routine-record-days: 30
    attention-record-days: 180
    initial-delay-ms: 90000
    interval-ms: 21600000

autark:
  pro:
    entitlement:
      online-grace: 14d
      retry-base: 1m
      retry-maximum: 1h
      renewal-jitter-maximum: 30m
      scheduler-enabled: true
      scheduler-initial-delay-ms: 30000
      scheduler-interval-ms: 60000
