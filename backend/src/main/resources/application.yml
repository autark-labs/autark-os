spring:
  application:
    name: autark-os-backend

server:
  port: 8082

autark-os:
  runtime-root: ../runtime/autark-os
  guardian:
    enabled: true
    initial-delay-ms: 10000
    interval-ms: 15000
  backups:
    scheduler:
      enabled: true
      initial-delay-ms: 30000
      interval-ms: 60000
