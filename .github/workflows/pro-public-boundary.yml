name: Pro public boundary

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  boundary:
    name: Keep private Pro intelligence out of CE
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Check public/private repository boundary
        run: bash scripts/check-pro-public-boundary.sh
